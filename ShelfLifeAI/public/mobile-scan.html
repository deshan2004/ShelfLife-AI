<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mobile Scanner - ShelfLife AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #030a03;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .scanner-header {
            background: linear-gradient(135deg, #0c190c, #071007);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(57, 231, 95, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .logo i {
            font-size: 24px;
            color: #39e75f;
        }

        .logo span {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .logo-ai {
            color: #39e75f;
        }

        .pairing-info {
            background: rgba(57, 231, 95, 0.1);
            border-radius: 60px;
            padding: 6px 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
        }

        .pairing-code {
            font-weight: 800;
            color: #39e75f;
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        /* Camera Container */
        .camera-container {
            position: relative;
            width: 100%;
            background: #000;
            min-height: 45vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 400px;
        }

        /* Scan Overlay */
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 80%;
            height: 30%;
            border: 2px solid #39e75f;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #39e75f, #6eef8b, #39e75f, transparent);
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .scan-instruction {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scan-instruction i {
            color: #39e75f;
        }

        /* Controls */
        .controls {
            padding: 16px;
            display: flex;
            gap: 8px;
            background: linear-gradient(135deg, #0c190c, #071007);
            border-top: 1px solid rgba(57, 231, 95, 0.2);
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-capture {
            background: linear-gradient(135deg, #16a34a, #39e75f);
            color: #030a03;
        }

        .btn-capture:active {
            transform: scale(0.98);
        }

        .btn-switch {
            background: rgba(17, 22, 17, 0.8);
            border: 1px solid rgba(57, 231, 95, 0.3);
            color: #39e75f;
        }

        .btn-close {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        /* Mode Indicator */
        .mode-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 4px 10px;
            border-radius: 60px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .mode-indicator i {
            color: #39e75f;
        }

        /* Result Toast */
        .result-toast {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            background: #22c55e;
            color: #030a03;
            padding: 14px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            animation: slideUp 0.3s ease;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .result-toast.error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload Section */
        .upload-section {
            padding: 16px;
            text-align: center;
            border-top: 1px solid rgba(57, 231, 95, 0.1);
        }

        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(57, 231, 95, 0.1);
            border: 1px solid rgba(57, 231, 95, 0.3);
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .upload-label i {
            color: #39e75f;
        }

        #file-input {
            display: none;
        }

        /* Processing Overlay */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(57, 231, 95, 0.2);
            border-top-color: #39e75f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .processing-text {
            font-size: 0.8rem;
            color: #9bbf9b;
        }

        /* Connection Status */
        .connection-status {
            background: rgba(57, 231, 95, 0.1);
            padding: 8px;
            text-align: center;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .connection-status.connected {
            background: rgba(57, 231, 95, 0.2);
            color: #4ade80;
        }

        @media (max-width: 600px) {
            .scan-frame {
                width: 90%;
                height: 25%;
            }
            
            .btn {
                padding: 10px;
                font-size: 0.7rem;
            }
            
            .controls {
                padding: 12px;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="scanner-header">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <span>ShelfLife <span class="logo-ai">AI</span></span>
        </div>
        <div class="pairing-info">
            <i class="fas fa-link"></i>
            <span>Connected to computer:</span>
            <span class="pairing-code" id="pairingCode">Loading...</span>
        </div>
    </div>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            <div class="scan-instruction">
                <i class="fas fa-camera"></i>
                <span id="instructionText">Position barcode in frame</span>
            </div>
        </div>
        <div class="mode-indicator" id="modeIndicator">
            <i class="fas fa-barcode"></i>
            <span>Barcode Mode</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-capture" id="captureBtn">
            <i class="fas fa-camera"></i> Scan Now
        </button>
        <button class="btn btn-switch" id="switchModeBtn">
            <i class="fas fa-sync-alt"></i> Switch Mode
        </button>
        <button class="btn btn-close" id="closeBtn">
            <i class="fas fa-times"></i> Close
        </button>
    </div>

    <div class="upload-section">
        <label class="upload-label" id="uploadLabel">
            <i class="fas fa-upload"></i> Upload Photo
            <input type="file" id="file-input" accept="image/*">
        </label>
    </div>

    <div class="connection-status" id="connectionStatus">
        <i class="fas fa-spinner fa-pulse"></i>
        <span>Connecting to computer...</span>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const pairingCode = urlParams.get('pair');
        const scanType = urlParams.get('type') || 'barcode';

        let currentMode = scanType;
        let stream = null;
        let animationId = null;
        let isScanning = true;
        let isConnected = false;

        // Display pairing code
        document.getElementById('pairingCode').textContent = pairingCode || 'MANUAL';

        // Connection status
        const connectionStatus = document.getElementById('connectionStatus');
        
        // Send ready event to parent
        function sendReady() {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'ready',
                    code: pairingCode
                }, '*');
                connectionStatus.innerHTML = '<i class="fas fa-check-circle"></i><span>Connected! Ready to scan</span>';
                connectionStatus.classList.add('connected');
                isConnected = true;
                
                // Start scanning if in barcode mode
                if (currentMode === 'barcode') {
                    isScanning = true;
                    animationId = requestAnimationFrame(detectBarcode);
                }
            } else {
                connectionStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i><span>Not connected to computer. Please open from the ShelfLife AI website.</span>';
            }
        }

        // Update UI based on mode
        function updateModeUI() {
            const modeIndicator = document.getElementById('modeIndicator');
            const instructionText = document.getElementById('instructionText');
            
            if (currentMode === 'barcode') {
                modeIndicator.innerHTML = '<i class="fas fa-barcode"></i><span>Barcode Mode</span>';
                instructionText.textContent = 'Position barcode in frame';
            } else {
                modeIndicator.innerHTML = '<i class="fas fa-eye"></i><span>OCR Mode</span>';
                instructionText.textContent = 'Position expiry date clearly';
            }
        }

        // Send scan result to parent window
        function sendResult(type, value) {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'scan',
                    code: pairingCode,
                    scanData: { type: type, value: value }
                }, '*');
                showToast('✓ Sent to computer!', 'success');
                
                // Vibrate if supported
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                
                // Reset scanning after success
                setTimeout(() => {
                    if (currentMode === 'barcode' && !isScanning && isConnected) {
                        isScanning = true;
                        animationId = requestAnimationFrame(detectBarcode);
                    }
                }, 2000);
            } else {
                console.log('Scan result:', type, value);
                showToast('✓ Scan successful!', 'success');
            }
        }

        // Show toast message
        function showToast(message, type) {
            const existingToast = document.querySelector('.result-toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `result-toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // Show processing overlay
        function showProcessing() {
            const overlay = document.createElement('div');
            overlay.className = 'processing-overlay';
            overlay.id = 'processingOverlay';
            overlay.innerHTML = '<div class="spinner"></div><div class="processing-text">Processing image...</div>';
            document.body.appendChild(overlay);
        }

        function hideProcessing() {
            const overlay = document.getElementById('processingOverlay');
            if (overlay) overlay.remove();
        }

        // Barcode detection
        async function detectBarcode() {
            const video = document.getElementById('video');
            if (!video || video.readyState < 2 || !isScanning || !isConnected) {
                if (isScanning && isConnected) {
                    animationId = requestAnimationFrame(detectBarcode);
                }
                return;
            }
            
            try {
                if ('BarcodeDetector' in window) {
                    const barcodeDetector = new BarcodeDetector({
                        formats: ['qr_code', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'code_93', 'codabar', 'itf']
                    });
                    
                    const barcodes = await barcodeDetector.detect(video);
                    
                    if (barcodes.length > 0) {
                        isScanning = false;
                        sendResult('barcode', barcodes[0].rawValue);
                        return;
                    }
                }
            } catch (error) {
                console.error('Barcode detection error:', error);
            }
            
            if (isScanning && isConnected) {
                animationId = requestAnimationFrame(detectBarcode);
            }
        }

        // Start camera
        async function startCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                
                const constraints = {
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    if (currentMode === 'barcode' && isConnected) {
                        isScanning = true;
                        animationId = requestAnimationFrame(detectBarcode);
                    }
                };
            } catch (err) {
                console.error('Camera error:', err);
                showToast('Cannot access camera. Please allow camera permissions.', 'error');
            }
        }

        // Parse expiry date from text
        function parseExpiryDate(text) {
            const patterns = [
                /(\d{4})[-/](\d{1,2})[-/](\d{1,2})/,
                /(\d{1,2})[-/](\d{1,2})[-/](\d{4})/,
                /(?:exp|expiry|expiration|best before|use by|bb|bestby)[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
                /(?:exp|expiry)[:\s]*(\d{2})[-/](\d{2})[-/](\d{4})/i,
                /(\d{2})(\d{2})(\d{4})/,
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) {
                    let year, month, day;
                    if (match[1] && match[1].length === 4) {
                        year = parseInt(match[1]);
                        month = parseInt(match[2]);
                        day = parseInt(match[3]);
                    } else if (match[3] && match[3].length === 4) {
                        day = parseInt(match[1]);
                        month = parseInt(match[2]);
                        year = parseInt(match[3]);
                    } else if (match[1] && match[2] && match[3] && match[1].length === 2 && match[2].length === 2 && match[3].length === 4) {
                        day = parseInt(match[1]);
                        month = parseInt(match[2]);
                        year = parseInt(match[3]);
                    } else {
                        continue;
                    }
                    if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    }
                }
            }
            return null;
        }

        // Capture image for OCR
        async function captureForOCR() {
            const video = document.getElementById('video');
            if (!video) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            
            showProcessing();
            
            try {
                // Load Tesseract.js
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
                script.onload = async () => {
                    try {
                        const result = await Tesseract.recognize(imageData, 'eng');
                        const text = result.data.text;
                        const expiryDate = parseExpiryDate(text);
                        
                        if (expiryDate) {
                            sendResult('ocr', expiryDate);
                        } else {
                            showToast('No expiry date found. Try better lighting.', 'error');
                            if (currentMode === 'barcode' && isConnected) {
                                isScanning = true;
                                animationId = requestAnimationFrame(detectBarcode);
                            }
                        }
                    } catch (err) {
                        showToast('OCR failed. Please try again.', 'error');
                    }
                    hideProcessing();
                };
                script.onerror = () => {
                    showToast('Failed to load OCR engine. Check internet connection.', 'error');
                    hideProcessing();
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('OCR error:', error);
                showToast('OCR failed. Please try again.', 'error');
                hideProcessing();
            }
        }

        // Handle capture button click
        document.getElementById('captureBtn').addEventListener('click', () => {
            if (currentMode === 'barcode') {
                isScanning = false;
                if (animationId) cancelAnimationFrame(animationId);
            }
            captureForOCR();
        });

        // Handle mode switch
        document.getElementById('switchModeBtn').addEventListener('click', () => {
            currentMode = currentMode === 'barcode' ? 'ocr' : 'barcode';
            updateModeUI();
            
            // Send mode change to parent
            if (window.opener) {
                window.opener.postMessage({
                    type: 'modeChange',
                    code: pairingCode,
                    mode: currentMode
                }, '*');
            }
            
            if (currentMode === 'barcode' && isConnected) {
                isScanning = true;
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(detectBarcode);
            } else {
                isScanning = false;
                if (animationId) cancelAnimationFrame(animationId);
            }
        });

        // Handle file upload
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (event) => {
                showProcessing();
                try {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
                    script.onload = async () => {
                        try {
                            const result = await Tesseract.recognize(event.target.result, 'eng');
                            const text = result.data.text;
                            const expiryDate = parseExpiryDate(text);
                            
                            if (expiryDate) {
                                sendResult('ocr', expiryDate);
                            } else {
                                showToast('No expiry date found in image', 'error');
                            }
                        } catch (err) {
                            showToast('OCR failed', 'error');
                        }
                        hideProcessing();
                    };
                    script.onerror = () => {
                        showToast('Failed to load OCR engine', 'error');
                        hideProcessing();
                    };
                    document.head.appendChild(script);
                } catch (error) {
                    showToast('OCR failed', 'error');
                    hideProcessing();
                }
            };
            reader.readAsDataURL(file);
        });

        // Handle close
        document.getElementById('closeBtn').addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            window.close();
        });

        // Initialize
        updateModeUI();
        startCamera();
        sendReady();
    </script>
</body>
</html>
