<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mobile Scanner - ShelfLife AI</title>
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAsGToU-W0r3TkTK9BR1E6jFNzSJ4UE7Vw",
            authDomain: "shelflife-ai-141df.firebaseapp.com",
            projectId: "shelflife-ai-141df",
            storageBucket: "shelflife-ai-141df.firebasestorage.app",
            messagingSenderId: "916781512926",
            appId: "1:916781512926:web:5e2500ab7c7055bfccaa4f"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.setDoc = setDoc;
            window.doc = doc;
            
            // Try to authenticate anonymously to bypass some basic security rules
            try {
                const auth = getAuth(app);
                await signInAnonymously(auth);
            } catch (e) {
                console.log("Anonymous auth failed (might be disabled), proceeding without auth", e);
            }
            
            // Dispatch event when Firebase is ready
            window.dispatchEvent(new Event('firebaseReady'));
        } catch (error) {
            console.error("Firebase initialization failed:", error);
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #030a03;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .scanner-header {
            background: linear-gradient(135deg, #0c190c, #071007);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(57, 231, 95, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .logo i {
            font-size: 24px;
            color: #39e75f;
        }

        .logo span {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .logo-ai {
            color: #39e75f;
        }

        .pairing-info {
            background: rgba(57, 231, 95, 0.1);
            border-radius: 60px;
            padding: 6px 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
        }

        .pairing-code {
            font-weight: 800;
            color: #39e75f;
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        /* Camera Container */
        .camera-container {
            position: relative;
            width: 100%;
            background: #000;
            min-height: 45vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 400px;
        }

        /* Scan Overlay */
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 80%;
            height: 30%;
            border: 2px solid #39e75f;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #39e75f, #6eef8b, #39e75f, transparent);
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .scan-instruction {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scan-instruction i {
            color: #39e75f;
        }

        /* Controls */
        .controls {
            padding: 16px;
            display: flex;
            gap: 8px;
            background: linear-gradient(135deg, #0c190c, #071007);
            border-top: 1px solid rgba(57, 231, 95, 0.2);
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-capture {
            background: linear-gradient(135deg, #16a34a, #39e75f);
            color: #030a03;
        }

        .btn-capture:active {
            transform: scale(0.98);
        }

        .btn-switch {
            background: rgba(17, 22, 17, 0.8);
            border: 1px solid rgba(57, 231, 95, 0.3);
            color: #39e75f;
        }

        .btn-close {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        /* Mode Indicator */
        .mode-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 4px 10px;
            border-radius: 60px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .mode-indicator i {
            color: #39e75f;
        }

        /* Result Toast */
        .result-toast {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            background: #22c55e;
            color: #030a03;
            padding: 14px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            animation: slideUp 0.3s ease;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .result-toast.error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Upload Section */
        .upload-section {
            padding: 16px;
            text-align: center;
            border-top: 1px solid rgba(57, 231, 95, 0.1);
        }

        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(57, 231, 95, 0.1);
            border: 1px solid rgba(57, 231, 95, 0.3);
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .upload-label i {
            color: #39e75f;
        }

        #file-input {
            display: none;
        }

        /* Processing Overlay */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(57, 231, 95, 0.2);
            border-top-color: #39e75f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .processing-text {
            font-size: 0.8rem;
            color: #9bbf9b;
        }

        /* Connection Status */
        .connection-status {
            background: rgba(57, 231, 95, 0.1);
            padding: 8px;
            text-align: center;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .connection-status.connected {
            background: rgba(57, 231, 95, 0.2);
            color: #4ade80;
        }

        /* Scan History - New */
        .scan-history {
            background: rgba(7, 14, 7, 0.8);
            padding: 12px 16px;
            border-top: 1px solid rgba(57, 231, 95, 0.1);
            max-height: 150px;
            overflow-y: auto;
        }

        .scan-history::-webkit-scrollbar {
            width: 4px;
        }
        .scan-history::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .scan-history::-webkit-scrollbar-thumb {
            background: rgba(57, 231, 95, 0.3);
            border-radius: 4px;
        }

        .scan-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.7rem;
        }

        .scan-history-item:last-child {
            border-bottom: none;
        }

        .scan-history-item .scan-value {
            color: #9bbf9b;
            font-family: monospace;
        }

        .scan-history-item .scan-type {
            color: #39e75f;
            font-weight: 600;
        }

        .scan-history-item .scan-time {
            color: #5f8b5f;
            font-size: 0.6rem;
        }

        .scan-history-empty {
            text-align: center;
            color: #5f8b5f;
            font-size: 0.7rem;
            padding: 12px 0;
        }

        /* Add Product Modal */
        .add-product-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .add-product-content {
            background: #0f240f;
            border: 1px solid rgba(57, 231, 95, 0.3);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .add-product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(57, 231, 95, 0.2);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .add-product-header h3 {
            color: #39e75f;
            margin: 0;
        }

        .add-product-header button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #9bbf9b;
        }

        .form-group input {
            background: #071007;
            border: 1px solid rgba(57, 231, 95, 0.3);
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #39e75f;
        }

        .save-btn {
            background: #39e75f;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .scan-frame {
                width: 90%;
                height: 25%;
            }
            
            .btn {
                padding: 10px;
                font-size: 0.7rem;
            }
            
            .controls {
                padding: 12px;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="scanner-header">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <span>ShelfLife <span class="logo-ai">AI</span></span>
        </div>
        <div class="pairing-info">
            <i class="fas fa-link"></i>
            <span>Connected to:</span>
            <span class="pairing-code" id="pairingCode">Loading...</span>
        </div>
    </div>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            <div class="scan-instruction">
                <i class="fas fa-camera"></i>
                <span id="instructionText">Position barcode in frame</span>
            </div>
        </div>
        <div class="mode-indicator" id="modeIndicator">
            <i class="fas fa-barcode"></i>
            <span>Barcode Mode</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-capture" id="captureBtn">
            <i class="fas fa-camera"></i> Scan Now
        </button>
        <button class="btn btn-switch" id="switchModeBtn">
            <i class="fas fa-sync-alt"></i> Switch Mode
        </button>
        <button class="btn btn-close" id="closeBtn">
            <i class="fas fa-times"></i> Close
        </button>
    </div>

    <div class="upload-section">
        <label class="upload-label" id="uploadLabel">
            <i class="fas fa-upload"></i> Upload Photo
            <input type="file" id="file-input" accept="image/*">
        </label>
    </div>

    <!-- Scan History -->
    <div class="scan-history" id="scanHistory">
        <!-- History items will be added here -->
    </div>

    <!-- Status Footer -->
    <div class="status-footer" id="statusFooter">
        <i class="fas fa-desktop"></i>
        <span>Connecting to computer...</span>
    </div>

    <!-- Add Product Modal -->
    <div class="add-product-modal" id="addProductModal">
        <div class="add-product-content">
            <div class="add-product-header">
                <h3>Add Product</h3>
                <button id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-group">
                <label>Barcode</label>
                <input type="text" id="modalBarcode" placeholder="Scan or enter barcode">
            </div>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="modalName" placeholder="Enter product name">
            </div>
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" id="modalExpiry">
            </div>
            <div class="form-group" style="flex-direction: row; gap: 10px;">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                    <label>Quantity</label>
                    <input type="number" id="modalStock" value="1" min="1">
                </div>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                    <label>Price (LKR)</label>
                    <input type="number" id="modalPrice" value="0" min="0">
                </div>
            </div>
            <button class="save-btn" id="saveProductBtn">Save to Inventory</button>
        </div>
    </div>

    <script>
        // ============================================================
        // SHELFLIFE AI - MOBILE SCANNER
        // Barcode + OCR Scanner - Sends results back to main app
        // ============================================================

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let pairingCode = urlParams.get('pair');
        
        if (!pairingCode && !window.opener) {
            const manualCode = prompt("Enter the pairing code shown on your laptop to connect via Cloud:");
            if (manualCode && manualCode.trim().length > 0) {
                pairingCode = manualCode.trim().toUpperCase();
            }
        }
        const scanType = urlParams.get('type') || 'barcode';

        let currentMode = scanType;
        let stream = null;
        let animationId = null;
        let isScanning = true;
        let isConnected = false;
        let scanHistory = [];
        let isProcessing = false;
        let lastDecodeTime = 0;
        let zxingReader = null;
        try {
            zxingReader = new ZXing.BrowserMultiFormatReader();
        } catch(e) {}

        // DOM Elements
        const video = document.getElementById('video');
        const pairingCodeEl = document.getElementById('pairingCode');
        const connectionStatus = document.getElementById('connectionStatus');
        const modeIndicator = document.getElementById('modeIndicator');
        const instructionText = document.getElementById('instructionText');
        const scanHistoryEl = document.getElementById('scanHistory');
        const captureBtn = document.getElementById('captureBtn');
        const switchModeBtn = document.getElementById('switchModeBtn');
        const closeBtn = document.getElementById('closeBtn');
        const fileInput = document.getElementById('file-input');

        // Modal Elements
        const addProductModal = document.getElementById('addProductModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalBarcode = document.getElementById('modalBarcode');
        const modalName = document.getElementById('modalName');
        const modalExpiry = document.getElementById('modalExpiry');
        const modalStock = document.getElementById('modalStock');
        const modalPrice = document.getElementById('modalPrice');
        const saveProductBtn = document.getElementById('saveProductBtn');

        let pendingScanType = '';
        let pendingScanValue = '';

        // Display pairing code
        pairingCodeEl.textContent = pairingCode || 'MANUAL';

        // Modal Event Listeners
        closeModalBtn.addEventListener('click', () => {
            addProductModal.style.display = 'none';
            if (currentMode === 'barcode' && isConnected) {
                isScanning = true;
                animationId = requestAnimationFrame(detectBarcode);
            }
        });

        saveProductBtn.addEventListener('click', () => {
            const name = modalName.value.trim();
            if (!name) {
                showToast('Product Name is required', 'error');
                return;
            }
            
            const productData = {
                name: name,
                barcode: modalBarcode.value.trim() || pendingScanValue,
                expiryDate: modalExpiry.value,
                stock: parseInt(modalStock.value) || 1,
                sellingPrice: parseFloat(modalPrice.value) || 0,
                isComplete: true
            };

            addProductModal.style.display = 'none';
            sendResult(pendingScanType, pendingScanValue, productData);
            
            // Reset modal
            modalName.value = '';
            modalStock.value = '1';
            modalPrice.value = '0';
            
            if (currentMode === 'barcode' && isConnected) {
                isScanning = true;
                animationId = requestAnimationFrame(detectBarcode);
            }
        });

        // Function to show modal
        function promptProductDetails(type, value, parsedData = null) {
            isScanning = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            pendingScanType = type;
            pendingScanValue = value;
            
            if (type === 'barcode') {
                modalBarcode.value = value;
                modalExpiry.value = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];
            } else if (type === 'ocr') {
                modalBarcode.value = `OCR-${Date.now().toString().slice(-6)}`;
                modalExpiry.value = value;
            }
            
            if (parsedData) {
                if (parsedData.name) modalName.value = parsedData.name;
            }
            
            addProductModal.style.display = 'flex';
            modalName.focus();
        }

        // ============================================================
        // SEND READY EVENT TO PARENT
        // ============================================================
        async function sendReady() {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'ready',
                    code: pairingCode
                }, '*');
                connectionStatus.innerHTML = '<i class="fas fa-check-circle"></i><span>Connected! Ready to scan</span>';
                connectionStatus.classList.add('connected');
                isConnected = true;
                
                if (currentMode === 'barcode') {
                    isScanning = true;
                    animationId = requestAnimationFrame(detectBarcode);
                }
            } else if (window.db && pairingCode !== 'MANUAL') {
                try {
                    await window.setDoc(window.doc(window.db, 'mobile_scans', pairingCode), {
                        type: 'ready',
                        timestamp: new Date().toISOString()
                    });
                    connectionStatus.innerHTML = '<i class="fas fa-cloud"></i><span>Cloud Paired! Ready to scan</span>';
                    connectionStatus.classList.add('connected');
                    isConnected = true;
                    
                    if (currentMode === 'barcode') {
                        isScanning = true;
                        animationId = requestAnimationFrame(detectBarcode);
                    }
                } catch (e) {
                    connectionStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i><span>Failed to connect to cloud.</span>';
                }
            } else {
                connectionStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i><span>Not connected. Open from ShelfLife AI on computer.</span>';
            }
        }

        // ============================================================
        // SEND SCAN RESULT TO PARENT
        // ============================================================
        async function sendResult(type, value, productData = null) {
            const extraData = productData || {};
            
            // Add to history
            addToHistory(type, value);
            
            if (window.opener) {
                window.opener.postMessage({
                    type: 'scanResult',
                    code: pairingCode,
                    scanType: type,
                    value: value,
                    data: extraData
                }, '*');
                showToast(`Sent ${type} to computer`, 'success');
                if (navigator.vibrate) navigator.vibrate(200);
            } else if (window.db && pairingCode !== 'MANUAL') {
                try {
                    await window.setDoc(window.doc(window.db, 'mobile_scans', pairingCode), {
                        type: 'scanResult',
                        scanType: type,
                        value: value,
                        data: extraData,
                        timestamp: new Date().toISOString()
                    });
                    showToast(`Sent ${type} to computer via Cloud`, 'success');
                    if (navigator.vibrate) navigator.vibrate(200);
                } catch (e) {
                    showToast(`Failed to send ${type} to cloud`, 'error');
                }
            } else {
                showToast('Scan saved locally. Connect to computer to sync.', 'error');
            }
        }

        // ============================================================
        // TOAST MESSAGE
        // ============================================================
        function showToast(message, type) {
            const existingToast = document.querySelector('.result-toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `result-toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================================
        // SCAN HISTORY
        // ============================================================
        function addToHistory(type, value) {
            scanHistory.unshift({
                type: type,
                value: value,
                time: new Date().toLocaleTimeString()
            });
            
            if (scanHistory.length > 20) {
                scanHistory.pop();
            }
            
            renderHistory();
        }

        function renderHistory() {
            if (scanHistory.length === 0) {
                scanHistoryEl.innerHTML = '<div class="scan-history-empty">📋 Scan history will appear here</div>';
                return;
            }
            
            let html = '';
            scanHistory.forEach((item, index) => {
                const typeLabel = item.type === 'barcode' ? '📷 Barcode' : '📅 OCR';
                html += `
                    <div class="scan-history-item">
                        <span class="scan-type">${typeLabel}</span>
                        <span class="scan-value">${item.value}</span>
                        <span class="scan-time">${item.time}</span>
                    </div>
                `;
            });
            scanHistoryEl.innerHTML = html;
        }

        // ============================================================
        // UPDATE UI BASED ON MODE
        // ============================================================
        function updateModeUI() {
            if (currentMode === 'barcode') {
                modeIndicator.innerHTML = '<i class="fas fa-barcode"></i><span>Barcode Mode</span>';
                instructionText.textContent = 'Position barcode in frame';
                captureBtn.innerHTML = '<i class="fas fa-camera"></i> Scan Now';
            } else {
                modeIndicator.innerHTML = '<i class="fas fa-eye"></i><span>OCR Mode</span>';
                instructionText.textContent = 'Position expiry date clearly';
                captureBtn.innerHTML = '<i class="fas fa-camera"></i> Capture & Read';
            }
        }

        // ============================================================
        // BARCODE DETECTION (Auto-scan)
        // ============================================================
        async function detectBarcode() {
            if (!video || video.readyState < 2 || !isScanning || !isConnected || isProcessing) {
                if (isScanning && isConnected) {
                    animationId = requestAnimationFrame(detectBarcode);
                }
                return;
            }
            
            try {
                if ('BarcodeDetector' in window) {
                    const barcodeDetector = new BarcodeDetector({
                        formats: ['qr_code', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'code_93', 'codabar', 'itf']
                    });
                    
                    const barcodes = await barcodeDetector.detect(video);
                    
                    if (barcodes.length > 0 && currentMode === 'barcode') {
                        isScanning = false;
                        isProcessing = true;
                        const barcodeValue = barcodes[0].rawValue;
                        
                        isScanning = false;
                        isProcessing = true;
                        
                        // Trigger modal instead of sending immediately
                        promptProductDetails('barcode', barcodeValue);
                        
                        setTimeout(() => {
                            isProcessing = false;
                        }, 2000);
                        return;
                    }
                } else {
                    if (!zxingReader && typeof ZXing !== 'undefined') {
                        zxingReader = new ZXing.BrowserMultiFormatReader();
                    }
                    if (zxingReader) {
                        const now = Date.now();
                        if (now - lastDecodeTime > 500) {
                            lastDecodeTime = now;
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            const img = new Image();
                            img.src = canvas.toDataURL('image/jpeg', 0.8);
                            await new Promise(r => {
                                img.onload = r;
                                img.onerror = r;
                            });
                            
                            try {
                                const result = await zxingReader.decodeFromImageElement(img);
                                if (result && currentMode === 'barcode') {
                                    isScanning = false;
                                    isProcessing = true;
                                    
                                    // Trigger modal instead of sending immediately
                                    promptProductDetails('barcode', result.getText());
                                    
                                    setTimeout(() => {
                                        isProcessing = false;
                                    }, 2000);
                                    return;
                                }
                            } catch (e) {
                                // No barcode found
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Barcode detection error:', error);
            }
            
            if (isScanning && isConnected) {
                animationId = requestAnimationFrame(detectBarcode);
            }
        }

        // ============================================================
        // START CAMERA
        // ============================================================
        async function startCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                
                const constraints = {
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    if (currentMode === 'barcode' && isConnected) {
                        isScanning = true;
                        animationId = requestAnimationFrame(detectBarcode);
                    }
                };
            } catch (err) {
                console.error('Camera error:', err);
                showToast('Cannot access camera. Please allow camera permissions.', 'error');
            }
        }

        // ============================================================
        // PARSE EXPIRY DATE FROM TEXT (OCR Helper)
        // ============================================================
        function parseExpiryDate(text) {
            if (!text) return null;
            
            const cleanText = text.replace(/\s+/g, ' ').trim();
            
            const patterns = [
                /(\d{4})[-/\s\.](\d{1,2})[-/\s\.](\d{1,2})/,
                /(\d{1,2})[-/\s\.](\d{1,2})[-/\s\.](\d{4})/,
                /(?:exp|expiry|expiration|best before|use by|bb|bestby)[:\s]*(\d{4}[-/\s\.]\d{1,2}[-/\s\.]\d{1,2})/i,
                /(?:exp|expiry)[:\s]*(\d{2})[-/\s\.](\d{2})[-/\s\.](\d{4})/i,
                /(\d{2})(\d{2})(\d{4})/,
                /\b(\d{2})(\d{2})(\d{4})\b/,
                /\b(\d{1,2})[-/\s\.](\d{1,2})[-/\s\.](\d{4})\b/
            ];
            
            for (const pattern of patterns) {
                const match = cleanText.match(pattern);
                if (match) {
                    let year, month, day;
                    const match1 = match[1];
                    // If match 1 contains separators, split it (for pattern #3)
                    if (match1 && (match1.includes('-') || match1.includes('/') || match1.includes(' ') || match1.includes('.'))) {
                        const parts = match1.split(/[-/\s\.]/);
                        if (parts.length >= 3) {
                            year = parseInt(parts[0]);
                            month = parseInt(parts[1]);
                            day = parseInt(parts[2]);
                        }
                    } else if (match[1] && match[1].length === 4) {
                        year = parseInt(match[1]);
                        month = parseInt(match[2]);
                        day = parseInt(match[3]);
                    } else if (match[3] && match[3].length === 4) {
                        day = parseInt(match[1]);
                        month = parseInt(match[2]);
                        year = parseInt(match[3]);
                    } else if (match[1] && match[2] && match[3] && match[1].length === 2 && match[2].length === 2 && match[3].length === 4) {
                        day = parseInt(match[1]);
                        month = parseInt(match[2]);
                        year = parseInt(match[3]);
                    } else {
                        continue;
                    }
                    if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    }
                }
            }
            
            // Try just digits
            const digits = cleanText.replace(/\D/g, '');
            if (digits.length === 8) {
                const y = digits.substring(0, 4);
                const m = digits.substring(4, 6);
                const d = digits.substring(6, 8);
                if (parseInt(y) >= 2000 && parseInt(y) <= 2100 && parseInt(m) >= 1 && parseInt(m) <= 12 && parseInt(d) >= 1 && parseInt(d) <= 31) {
                    return `${y}-${m}-${d}`;
                }
            }
            
            return null;
        }

        // ============================================================
        // CAPTURE IMAGE FOR OCR
        // ============================================================
        async function captureForOCR() {
            if (!video || isProcessing) return;
            
            isProcessing = true;
            isScanning = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            
            showProcessing();
            
            try {
                if (typeof Tesseract === 'undefined') {
                    showToast('OCR engine not loaded yet. Please wait a moment and try again.', 'error');
                    hideProcessing();
                    isProcessing = false;
                    return;
                }
                const result = await Tesseract.recognize(imageData, 'eng');
                const text = result.data.text;
                const expiryDate = parseExpiryDate(text);
                
                if (expiryDate) {
                    promptProductDetails('ocr', expiryDate);
                } else {
                    showToast('No valid expiry date found', 'error');
                    if (currentMode === 'barcode' && isConnected) {
                        isScanning = true;
                        animationId = requestAnimationFrame(detectBarcode);
                    }
                }
            } catch (error) {
                console.error('OCR error:', error);
                showToast('OCR failed. Please try again.', 'error');
            } finally {
                hideProcessing();
                isProcessing = false;
            }
        }

        // ============================================================
        // PROCESSING OVERLAY
        // ============================================================
        function showProcessing() {
            const overlay = document.createElement('div');
            overlay.className = 'processing-overlay';
            overlay.id = 'processingOverlay';
            overlay.innerHTML = '<div class="spinner"></div><div class="processing-text">Processing image...</div>';
            document.body.appendChild(overlay);
        }

        function hideProcessing() {
            const overlay = document.getElementById('processingOverlay');
            if (overlay) overlay.remove();
        }

        // ============================================================
        // HANDLE FILE UPLOAD
        // ============================================================
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (event) => {
                showProcessing();
                try {
                    if (typeof Tesseract === 'undefined') {
                        showToast('OCR engine not loaded yet. Please wait a moment and try again.', 'error');
                        hideProcessing();
                        return;
                    }
                    const result = await Tesseract.recognize(event.target.result, 'eng');
                    const text = result.data.text;
                    const expiryDate = parseExpiryDate(text);
                    
                    if (expiryDate) {
                        promptProductDetails('ocr', expiryDate);
                    } else {
                        showToast('No expiry date found in image', 'error');
                    }
                } catch (error) {
                    showToast('OCR failed', 'error');
                } finally {
                    hideProcessing();
                }
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        // Capture Button
        captureBtn.addEventListener('click', async () => {
            if (currentMode === 'barcode') {
                if (!video || isProcessing) return;
                showProcessing();
                try {
                    if ('BarcodeDetector' in window) {
                        const barcodeDetector = new BarcodeDetector({ formats: ['qr_code', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'code_93', 'codabar', 'itf'] });
                        const barcodes = await barcodeDetector.detect(video);
                        if (barcodes.length > 0) {
                            isScanning = false;
                            promptProductDetails('barcode', barcodes[0].rawValue);
                            hideProcessing();
                            return;
                        }
                    }
                    if (!zxingReader && typeof ZXing !== 'undefined') zxingReader = new ZXing.BrowserMultiFormatReader();
                    if (zxingReader) {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const img = new Image();
                        img.src = canvas.toDataURL('image/jpeg', 0.8);
                        await new Promise(r => { img.onload = r; img.onerror = r; });
                        const result = await zxingReader.decodeFromImageElement(img);
                        if (result) {
                            isScanning = false;
                            promptProductDetails('barcode', result.getText());
                            hideProcessing();
                            return;
                        }
                    }
                    showToast('No barcode detected. Try again.', 'error');
                } catch (e) {
                    showToast('No barcode detected. Try again.', 'error');
                }
                hideProcessing();
            } else {
                captureForOCR();
            }
        });

        // Switch Mode
        switchModeBtn.addEventListener('click', () => {
            currentMode = currentMode === 'barcode' ? 'ocr' : 'barcode';
            updateModeUI();
            
            if (window.opener) {
                window.opener.postMessage({
                    type: 'modeChange',
                    code: pairingCode,
                    mode: currentMode
                }, '*');
            }
            
            if (currentMode === 'barcode' && isConnected) {
                isScanning = true;
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(detectBarcode);
            } else {
                isScanning = false;
                if (animationId) cancelAnimationFrame(animationId);
            }
            
            showToast(`Switched to ${currentMode === 'barcode' ? 'Barcode' : 'OCR'} mode`, 'success');
        });

        // Close Button
        closeBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            window.close();
        });

        // ============================================================
        // LISTEN FOR MESSAGES FROM PARENT
        // ============================================================
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'ping') {
                window.opener.postMessage({
                    type: 'pong',
                    code: pairingCode
                }, '*');
            }
            if (event.data && event.data.type === 'changeMode') {
                currentMode = event.data.mode || 'barcode';
                updateModeUI();
            }
        });

        // ============================================================
        // INITIALIZE
        // ============================================================
        updateModeUI();
        startCamera();
        
        // Wait for Firebase to be ready if not opened as popup
        if (!window.opener) {
            if (window.db) {
                sendReady();
            } else {
                window.addEventListener('firebaseReady', sendReady);
                // Fallback if it fails
                setTimeout(() => {
                    if (!window.db) sendReady();
                }, 3000);
            }
        } else {
            sendReady();
        }

        console.log('📱 ShelfLife AI Mobile Scanner initialized');
        console.log(`🔑 Pairing Code: ${pairingCode}`);
        console.log(`📷 Mode: ${currentMode}`);
    </script>
</body>
</html>
